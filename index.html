<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#4361ee;--accent2:#7209b7;--danger:#e63946;--warn:#f4a261;--success:#2a9d8f;
  --bg:#f8f9fa;--surface:#fff;--border:#e9ecef;--text:#212529;--muted:#6c757d;--radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:15px;color:var(--accent)}
.status{font-size:11px;display:flex;align-items:center;gap:4px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.dot.live{background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
nav{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);padding:0 8px;gap:2px;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;position:relative}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.badge{background:var(--danger);color:#fff;font-size:9px;border-radius:10px;padding:1px 5px;margin-left:3px}
main{max-width:760px;margin:0 auto;padding:16px}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px}
.input-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.input-row input[type=text]{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none}
.input-row input[type=text]:focus{border-color:var(--accent)}
.input-row input[type=date]{padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;color:var(--text);background:var(--surface)}
.input-row input[type=date]:focus{border-color:var(--accent)}
.input-row select{padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text);outline:none;max-width:160px}
.input-row button{padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;white-space:nowrap}
.input-row button:hover{opacity:.85}
.mit-label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer}
.mit-label input{cursor:pointer;accent-color:var(--danger)}
.task{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;transition:all .15s}
.task:hover{border-color:#adb5bd}
.task.done .task-text{text-decoration:line-through;color:var(--muted)}
.task.overdue{border-left:3px solid var(--danger)}
.task.due-soon{border-left:3px solid var(--warn)}
.task.mit-task{border-left:3px solid var(--danger)}
.task.done.mit-task{border-left:3px solid #ccc}
.task input[type=checkbox]{margin-top:2px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.task-body{flex:1;min-width:0}
.task-text{font-size:13px;line-height:1.4;word-break:break-word}
.task-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.tag-pri-high{background:#ffeaea;color:#c0392b}
.tag-pri-med{background:#fff3e0;color:#e65100}
.tag-pri-low{background:#e8f5e9;color:#2e7d32}
.tag-due{background:#e3f2fd;color:#1565c0}
.tag-due.overdue{background:#ffeaea;color:#c0392b}
.tag-due.due-soon{background:#fff3e0;color:#e65100}
.tag-client{background:#f3e5f5;color:#6a1b9a}
.tag-mit{background:#ffeaea;color:#c0392b;font-weight:700}
.tag-weekly{background:#e8f5e9;color:#2e7d32}
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task:hover .task-actions{opacity:1}
@media(max-width:600px){.task-actions{opacity:1}}
.act-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;border-radius:4px;font-size:14px;line-height:1}
.act-btn:hover{color:var(--text);background:#f1f3f5}
.empty{text-align:center;padding:28px 16px;color:var(--muted);font-size:13px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-num.red{color:var(--danger)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:12px;padding:20px;width:100%;max-width:400px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.modal label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;font-family:inherit;background:var(--surface);color:var(--text)}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{padding:7px 14px;border:1px solid var(--border);background:none;border-radius:var(--radius);cursor:pointer;font-size:13px}
.btn-save{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px}
.client-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.client-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f8f9fa;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.client-name{font-weight:600;font-size:13px}
.client-count{font-size:11px;color:var(--muted)}
.client-body{padding:10px 12px;display:none}
.review-section{margin-bottom:20px}
.review-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.review-item{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;border-radius:var(--radius);margin-bottom:4px;font-size:13px;background:var(--surface);border:1px solid var(--border)}
.review-item.overdue{background:#fff5f5;border-color:#ffcdd2}
.review-item.done{background:#f0faf8;border-color:#b2dfdb}
.src-tag{font-size:10px;padding:1px 5px;border-radius:8px;flex-shrink:0}
.view-toggle{display:flex;gap:4px;margin-bottom:12px}
.view-btn{padding:5px 10px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--muted)}
.view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.kanban-col{background:#f8f9fa;border:1px solid var(--border);border-radius:var(--radius);padding:10px}
.kanban-col-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.goal-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.goal-title-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.goal-title{font-weight:600;font-size:13px;flex:1}
.progress-bar{height:4px;background:#e9ecef;border-radius:2px;margin:6px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:2px}
.step-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;border-bottom:1px solid #f1f3f5}
.prospect-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.sync-note{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;padding-top:12px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo"><i class="ti ti-layout-dashboard"></i> Work Dashboard</div>
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="exportCSV()" style="background:none;border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted)"><i class="ti ti-download"></i> Export</button>
    <div class="status"><div class="dot" id="dot"></div><span id="status-txt">Connecting...</span></div>
  </div>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Edit Task</h3>
    <label>Task</label>
    <input type="text" id="edit-text">
    <label>Due Date</label>
    <input type="date" id="edit-due">
    <label>Priority</label>
    <select id="edit-pri">
      <option value="high">High</option>
      <option value="med">Med</option>
      <option value="low">Low</option>
    </select>
    <label>Assign to Client</label>
    <select id="edit-client"></select>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:12px">
      <input type="checkbox" id="edit-mit" style="width:auto;cursor:pointer;accent-color:var(--danger)"> Mark as MIT (Most Important Task)
    </label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZGjmWkWZ63cXk0XNZe-b6WZa3GUDkMjI",
  authDomain: "wdb2026-5cc9c.firebaseapp.com",
  databaseURL: "https://wdb2026-5cc9c-default-rtdb.firebaseio.com",
  projectId: "wdb2026-5cc9c",
  storageBucket: "wdb2026-5cc9c.firebasestorage.app",
  messagingSenderId: "569336803850",
  appId: "1:569336803850:web:ed9c96dcc107820b0f25f3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dataRef = db.ref('task-dashboard');

const CLIENT_LIST = [
  "Arts & Letters","ASGN","Ascentage_Pharma","Baskervill","BHC","BSC",
  "Capital_Interiors","CDF","CFP_Board","Clutch","Custom Ink","Dittmar",
  "DOrado Services","Exostar","Four, Inc.","HAK","HH Hunt","Hooker","IEI",
  "Kaleo","Kjellstrom + Lee","Legacy Food Group","Lexitas","Lifecycle Renewables",
  "M&E Contractors","Mindoula","Monument_Cos.","NexTech Solutions",
  "Otolaryngology Assoc","PartnerMD","PGi","Pink Shell","Precigen","RoosterBio",
  "Schnabel","SpottsFain","St Paper","Sweet_Frog","THTBC","UofR","UPM","Veranex",
  "Virginia Green","Weidmeuller","Weinstein","West Creek Financial"
];

let data = {today:[],week:[],goals:[],clients:{},prospects:[],questions:[]};
let activeTab = 'today';
let viewMode = 'list';
let editCtx = null;

function loadData(){
  dataRef.on('value', snap => {
    const val = snap.val();
    if(val){
      data.today     = val.today     || [];
      data.week      = val.week      || [];
      data.goals     = val.goals     || [];
      data.clients   = val.clients   || {};
      data.prospects = val.prospects || [];
      data.questions = val.questions || [];
    }
    document.getElementById('dot').className='dot live';
    document.getElementById('status-txt').textContent='Live';
    render();
  });
}
function save(){ dataRef.set(data); }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d)return''; const [y,m,day]=d.split('-'); return m+'/'+day+'/'+y.slice(2); }
function dateClass(d){
  if(!d)return'';
  const t=todayStr();
  if(d<t)return'overdue';
  const soon=new Date(); soon.setDate(soon.getDate()+3);
  if(d<=soon.toISOString().slice(0,10))return'due-soon';
  return'';
}

function getStats(){
  const all=[...data.today,...data.week];
  const t=todayStr();
  const wa=new Date(); wa.setDate(wa.getDate()-7);
  const was=wa.toISOString().slice(0,10);
  const mits=[...data.today,...data.week].filter(x=>x.mit&&!x.done).length;
  return{
    overdue:all.filter(x=>!x.done&&x.due&&x.due<t).length,
    dueToday:all.filter(x=>!x.done&&x.due===t).length,
    doneSince:all.filter(x=>x.done&&x.doneAt>=was).length,
    mits
  };
}

function clientSelectOpts(val){
  return '<option value="">— No client —</option>'+CLIENT_LIST.map(c=>`<option value="${c}"${val===c?' selected':''}>${c}</option>`).join('');
}

function taskHTML(t, list, idx){
  const dc=t.done?'':dateClass(t.due||'');
  let cls='task';
  if(t.done)cls+=' done';
  if(!t.done&&dc==='overdue')cls+=' overdue';
  if(!t.done&&dc==='due-soon')cls+=' due-soon';
  if(t.mit&&!t.done)cls+=' mit-task';
  const weeklyTag=(list==='week')?'<span class="tag tag-weekly src-tag">Weekly</span>':'';
  return`<div class="${cls}">
    <input type="checkbox"${t.done?' checked':''} onchange="toggleTask('${list}',${idx})">
    <div class="task-body">
      <div class="task-text">${t.text}</div>
      <div class="task-meta">
        <span class="tag tag-pri-${t.pri||'med'}">${(t.pri||'med').toUpperCase()}</span>
        ${t.due?`<span class="tag tag-due ${dc}">${fmtDate(t.due)}</span>`:''}
        ${t.client?`<span class="tag tag-client"><i class="ti ti-building" style="font-size:9px"></i> ${t.client}</span>`:''}
        ${t.mit&&!t.done?'<span class="tag tag-mit"><i class="ti ti-star" style="font-size:9px"></i> MIT</span>':''}
        ${weeklyTag}
      </div>
    </div>
    <div class="task-actions">
      <button class="act-btn" onclick="openEdit('${list}',${idx})" title="Edit"><i class="ti ti-pencil"></i></button>
      <button class="act-btn" onclick="deleteTask('${list}',${idx})" title="Delete"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}

function renderTaskList(list, tasks){
  if(!tasks||!tasks.length)return'<div class="empty">No tasks yet — add one above</div>';
  return tasks.map((t,i)=>taskHTML(t,list,i)).join('');
}

function renderKanban(list, tasks){
  const cols={high:[],med:[],low:[]};
  tasks.forEach((t,i)=>{if(!t.done)(cols[t.pri||'med']).push({t,i});});
  const done=tasks.map((t,i)=>({t,i})).filter(x=>x.t.done);
  const colHTML=(label,items)=>`<div class="kanban-col">
    <div class="kanban-col-title">${label}</div>
    ${items.length?items.map(({t,i})=>taskHTML(t,list,i)).join(''):'<div class="empty" style="padding:12px">—</div>'}
  </div>`;
  return`<div class="kanban">
    ${colHTML('🔴 High',cols.high)}${colHTML('🟡 Med',cols.med)}${colHTML('🟢 Low',cols.low)}${colHTML('✅ Done',done)}
  </div>`;
}

function inputRowHTML(list, placeholder){
  const showMit=(list==='today'||list==='week');
  return`<div class="input-row">
    <input type="text" id="${list}-txt" placeholder="${placeholder}" onkeypress="if(event.key==='Enter')quickAdd('${list}')">
    <input type="date" id="${list}-due">
    <select id="${list}-pri"><option value="high">High</option><option value="med" selected>Med</option><option value="low">Low</option></select>
    <select id="${list}-client" style="max-width:160px">${clientSelectOpts('')}</select>
    ${showMit?`<label class="mit-label"><input type="checkbox" id="${list}-mit"> MIT</label>`:''}
    <button onclick="quickAdd('${list}')"><i class="ti ti-plus"></i> Add</button>
  </div>`;
}

function quickAdd(list){
  const txt=document.getElementById(list+'-txt').value.trim();
  if(!txt)return;
  const due=document.getElementById(list+'-due').value||null;
  const pri=document.getElementById(list+'-pri').value;
  const clientEl=document.getElementById(list+'-client');
  const client=clientEl?clientEl.value||null:null;
  const mitEl=document.getElementById(list+'-mit');
  const mit=mitEl?mitEl.checked:false;
  const task={id:uid(),text:txt,pri,due,done:false,client,mit};
  data[list].push(task);
  if(client){
    if(!data.clients[client])data.clients[client]={tasks:[]};
    data.clients[client].tasks.push({...task,sourceList:list});
  }
  save();
  document.getElementById(list+'-txt').value='';
  document.getElementById(list+'-due').value='';
  if(mitEl)mitEl.checked=false;
  if(clientEl)clientEl.value='';
}

function toggleTask(list,idx){
  if(!data[list][idx])return;
  data[list][idx].done=!data[list][idx].done;
  data[list][idx].doneAt=data[list][idx].done?todayStr():null;
  syncClientTask(list,idx);
  save();
}
function deleteTask(list,idx){if(!confirm('Delete this task?'))return;data[list].splice(idx,1);save();}

function syncClientTask(list,idx){
  const t=data[list][idx];
  if(t&&t.client&&data.clients[t.client]){
    const ci=data.clients[t.client].tasks.findIndex(x=>x.id===t.id);
    if(ci>=0)data.clients[t.client].tasks[ci]={...t,sourceList:list};
  }
}

function openEdit(list,idx){
  const t=data[list][idx];
  editCtx={list,idx};
  document.getElementById('edit-text').value=t.text;
  document.getElementById('edit-due').value=t.due||'';
  document.getElementById('edit-pri').value=t.pri||'med';
  document.getElementById('edit-mit').checked=t.mit||false;
  document.getElementById('edit-client').innerHTML=clientSelectOpts(t.client||'');
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';editCtx=null;}
function saveEdit(){
  if(!editCtx)return;
  const{list,idx}=editCtx;
  const t=data[list][idx];
  const oldClient=t.client;
  const newClient=document.getElementById('edit-client').value||null;
  t.text=document.getElementById('edit-text').value.trim()||t.text;
  t.due=document.getElementById('edit-due').value||null;
  t.pri=document.getElementById('edit-pri').value;
  t.mit=document.getElementById('edit-mit').checked;
  t.client=newClient;
  if(oldClient&&oldClient!==newClient&&data.clients[oldClient]){
    data.clients[oldClient].tasks=data.clients[oldClient].tasks.filter(x=>x.id!==t.id);
  }
  if(newClient){
    if(!data.clients[newClient])data.clients[newClient]={tasks:[]};
    const ci=data.clients[newClient].tasks.findIndex(x=>x.id===t.id);
    if(ci>=0)data.clients[newClient].tasks[ci]={...t,sourceList:list};
    else data.clients[newClient].tasks.push({...t,sourceList:list});
  }
  save();closeModal();
}

function renderTabs(){
  const s=getStats();
  const tabs=[
    {id:'today',label:'Today',icon:'ti-sun'},
    {id:'week',label:'Week',icon:'ti-calendar-week'},
    {id:'mits',label:'MITs',icon:'ti-star',badge:s.mits||null},
    {id:'goals',label:'Goals',icon:'ti-target'},
    {id:'clients',label:'Clients',icon:'ti-building'},
    {id:'prospects',label:'Prospects',icon:'ti-user-search'},
    {id:'questions',label:'Questions',icon:'ti-help'},
    {id:'review',label:'Review',icon:'ti-chart-bar',badge:s.overdue||null}
  ];
  document.getElementById('nav').innerHTML=tabs.map(t=>
    `<button class="tab${activeTab===t.id?' active':''}" onclick="switchTab('${t.id}')">
      <i class="ti ${t.icon}"></i> ${t.label}${t.badge?`<span class="badge">${t.badge}</span>`:''}
    </button>`
  ).join('');
}
function switchTab(id){activeTab=id;render();}
function setView(v){viewMode=v;render();}

function render(){
  renderTabs();
  const m=document.getElementById('main');
  const tabs={
    today:renderToday,week:renderWeek,mits:renderMITs,goals:renderGoals,
    clients:renderClients,prospects:renderProspects,questions:renderQuestions,review:renderReview
  };
  m.innerHTML=(tabs[activeTab]||renderToday)()+
    '<div class="sync-note"><i class="ti ti-cloud-check" style="font-size:11px;margin-right:3px"></i>Auto-saves · Access from any device</div>';
}

function renderToday(){
  return`<div class="section-title">Today's Tasks</div>
    ${inputRowHTML('today',"Add a task for today...")}
    <div class="view-toggle">
      <button class="view-btn${viewMode==='list'?' active':''}" onclick="setView('list')">List</button>
      <button class="view-btn${viewMode==='kanban'?' active':''}" onclick="setView('kanban')">Kanban</button>
    </div>
    ${viewMode==='kanban'?renderKanban('today',data.today):renderTaskList('today',data.today)}`;
}

function renderWeek(){
  return`<div class="section-title">This Week</div>
    ${inputRowHTML('week',"Add a weekly task...")}
    <div class="view-toggle">
      <button class="view-btn${viewMode==='list'?' active':''}" onclick="setView('list')">List</button>
      <button class="view-btn${viewMode==='kanban'?' active':''}" onclick="setView('kanban')">Kanban</button>
    </div>
    ${viewMode==='kanban'?renderKanban('week',data.week):renderTaskList('week',data.week)}`;
}

function renderMITs(){
  const todayMITs=data.today.map((t,i)=>({t,list:'today',idx:i})).filter(x=>x.t.mit);
  const weekMITs=data.week.map((t,i)=>({t,list:'week',idx:i})).filter(x=>x.t.mit);
  const all=[...todayMITs,...weekMITs];
  const active=all.filter(x=>!x.t.done);
  const done=all.filter(x=>x.t.done);
  return`<div class="section-title">Most Important Tasks</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Tasks marked MIT from Daily &amp; Weekly. Check the MIT box when adding or editing.</p>
    ${active.length?active.map(({t,list,idx})=>taskHTML(t,list,idx)).join(''):'<div class="empty">No active MITs — check the MIT box when adding or editing a task</div>'}
    ${done.length?`<div class="section-title" style="margin-top:16px">Completed MITs</div>${done.map(({t,list,idx})=>taskHTML(t,list,idx)).join('')}`:''}`;
}

function renderGoals(){
  const addRow=`<div class="input-row">
    <input type="text" id="goal-txt" placeholder="Add a goal...">
    <input type="date" id="goal-due">
    <select id="goal-pri"><option value="high">High</option><option value="med" selected>Med</option><option value="low">Low</option></select>
    <button onclick="addGoal()"><i class="ti ti-plus"></i> Add</button>
  </div>`;
  const list=data.goals.map((g,i)=>{
    const steps=g.steps||[];
    const done=steps.filter(s=>s.done).length;
    const pct=steps.length?Math.round(done/steps.length*100):0;
    return`<div class="goal-block">
      <div class="goal-title-row">
        <input type="checkbox"${g.done?' checked':''} onchange="toggleTask('goals',${i})" style="cursor:pointer;accent-color:var(--accent)">
        <div class="goal-title${g.done?' done':''}">${g.text}</div>
        <span class="tag tag-pri-${g.pri||'med'}">${(g.pri||'med').toUpperCase()}</span>
        ${g.due?`<span class="tag tag-due ${dateClass(g.due)}">${fmtDate(g.due)}</span>`:''}
        <button class="act-btn" onclick="openEdit('goals',${i})"><i class="ti ti-pencil"></i></button>
        <button class="act-btn" onclick="deleteTask('goals',${i})"><i class="ti ti-trash"></i></button>
      </div>
      ${steps.length?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${done}/${steps.length} steps · ${pct}%</div>`:''}
      ${steps.map((s,si)=>`<div class="step-item">
        <input type="checkbox"${s.done?' checked':''} onchange="toggleStep(${i},${si})" style="cursor:pointer;accent-color:var(--accent)">
        <span style="${s.done?'text-decoration:line-through;color:var(--muted)':''}">${s.text}</span>
        <button class="act-btn" style="margin-left:auto" onclick="deleteStep(${i},${si})"><i class="ti ti-x"></i></button>
      </div>`).join('')}
      <div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="step-${i}" placeholder="Add step..." style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none" onkeypress="if(event.key==='Enter')addStep(${i})">
        <button onclick="addStep(${i})" style="padding:5px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">Add Step</button>
      </div>
    </div>`;
  }).join('');
  return`<div class="section-title">Goals</div>${addRow}${list||'<div class="empty">No goals yet</div>'}`;
}
function addGoal(){const txt=document.getElementById('goal-txt').value.trim();if(!txt)return;data.goals.push({id:uid(),text:txt,pri:document.getElementById('goal-pri').value,due:document.getElementById('goal-due').value||null,done:false,steps:[]});save();document.getElementById('goal-txt').value='';}
function addStep(gi){const el=document.getElementById('step-'+gi);const txt=el.value.trim();if(!txt)return;if(!data.goals[gi].steps)data.goals[gi].steps=[];data.goals[gi].steps.push({text:txt,done:false});save();el.value='';}
function toggleStep(gi,si){data.goals[gi].steps[si].done=!data.goals[gi].steps[si].done;save();}
function deleteStep(gi,si){data.goals[gi].steps.splice(si,1);save();}

function renderClients(){
  let html=`<div class="section-title">Clients (${CLIENT_LIST.length})</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Tasks assigned from Daily or Weekly appear here automatically. You can also add tasks directly to any client.</p>`;
  CLIENT_LIST.forEach(name=>{
    const stored=data.clients[name]||{tasks:[]};
    const tasks=stored.tasks||[];
    const active=tasks.filter(t=>!t.done).length;
    const sid=name.replace(/[^a-zA-Z0-9]/g,'_');
    html+=`<div class="client-block">
      <div class="client-header" onclick="toggleClient('${sid}')">
        <div>
          <div class="client-name"><i class="ti ti-building" style="color:var(--accent);margin-right:5px"></i>${name}</div>
          <div class="client-count">${active} active · ${tasks.length} total</div>
        </div>
        <i class="ti ti-chevron-down" id="chev-${sid}" style="transition:transform .2s;color:var(--muted)"></i>
      </div>
      <div class="client-body" id="cbody-${sid}">
        <div class="input-row">
          <input type="text" id="ct-${sid}" placeholder="Add task for ${name}..." onkeypress="if(event.key==='Enter')addClientTask('${name}','${sid}')">
          <input type="date" id="ctd-${sid}">
          <select id="ctp-${sid}"><option value="high">High</option><option value="med" selected>Med</option><option value="low">Low</option></select>
          <button onclick="addClientTask('${name}','${sid}')"><i class="ti ti-plus"></i> Add</button>
        </div>
        ${tasks.length?tasks.map((t,ti)=>clientTaskHTML(t,name,ti)).join(''):'<div class="empty">No tasks yet</div>'}
      </div>
    </div>`;
  });
  return html;
}

function clientTaskHTML(t,clientName,idx){
  const dc=t.done?'':dateClass(t.due||'');
  let cls='task';
  if(t.done)cls+=' done';
  if(!t.done&&dc==='overdue')cls+=' overdue';
  const srcTag=t.sourceList?`<span class="tag src-tag" style="background:#e3f2fd;color:#1565c0">${t.sourceList==='today'?'Daily':'Weekly'}</span>`:'';
  return`<div class="${cls}">
    <input type="checkbox"${t.done?' checked':''} onchange="toggleClientTask('${clientName}',${idx})">
    <div class="task-body">
      <div class="task-text">${t.text}</div>
      <div class="task-meta">
        <span class="tag tag-pri-${t.pri||'med'}">${(t.pri||'med').toUpperCase()}</span>
        ${t.due?`<span class="tag tag-due ${dc}">${fmtDate(t.due)}</span>`:''}
        ${srcTag}
      </div>
    </div>
    <div class="task-actions">
      <button class="act-btn" onclick="deleteClientTask('${clientName}',${idx})"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}

function toggleClient(sid){
  const b=document.getElementById('cbody-'+sid);
  const c=document.getElementById('chev-'+sid);
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  c.style.transform=open?'':'rotate(180deg)';
}
function addClientTask(clientName,sid){
  const txt=document.getElementById('ct-'+sid).value.trim();
  if(!txt)return;
  if(!data.clients[clientName])data.clients[clientName]={tasks:[]};
  data.clients[clientName].tasks.push({id:uid(),text:txt,pri:document.getElementById('ctp-'+sid).value,due:document.getElementById('ctd-'+sid).value||null,done:false,client:clientName});
  save();
  document.getElementById('ct-'+sid).value='';
}
function toggleClientTask(clientName,idx){
  if(!data.clients[clientName])return;
  const t=data.clients[clientName].tasks[idx];
  t.done=!t.done;t.doneAt=t.done?todayStr():null;
  if(t.sourceList&&data[t.sourceList]){
    const si=data[t.sourceList].findIndex(x=>x.id===t.id);
    if(si>=0){data[t.sourceList][si].done=t.done;data[t.sourceList][si].doneAt=t.doneAt;}
  }
  save();
}
function deleteClientTask(clientName,idx){if(!confirm('Delete?'))return;data.clients[clientName].tasks.splice(idx,1);save();}

function renderProspects(){
  const addRow=`<div class="input-row">
    <input type="text" id="pro-name" placeholder="Prospect name...">
    <input type="text" id="pro-co" placeholder="Company...">
    <input type="date" id="pro-due">
    <select id="pro-status"><option>Active</option><option>Warm</option><option>Hot</option><option>Closed</option></select>
    <button onclick="addProspect()"><i class="ti ti-plus"></i> Add</button>
  </div>`;
  const list=data.prospects.map((p,i)=>`<div class="prospect-block">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-weight:600;font-size:13px">${p.name}${p.company?` — <span style="font-weight:400">${p.company}</span>`:''}</div>
        <div style="font-size:12px;color:var(--muted)">${p.due?'Follow-up: '+fmtDate(p.due):'No follow-up set'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32">${p.status||'Active'}</span>
        <button class="act-btn" onclick="deleteProspect(${i})"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    <div style="margin-top:8px">
      <input type="text" placeholder="Add note..." id="pnote-${i}" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none" onkeypress="if(event.key==='Enter')addProspectNote(${i})">
      ${(p.notes||[]).map(n=>`<div style="font-size:12px;color:var(--muted);padding:3px 0;border-bottom:1px solid #f1f3f5">${n}</div>`).join('')}
    </div>
  </div>`).join('');
  return`<div class="section-title">Prospects</div>${addRow}${list||'<div class="empty">No prospects yet</div>'}`;
}
function addProspect(){const name=document.getElementById('pro-name').value.trim();if(!name)return;data.prospects.push({id:uid(),name,company:document.getElementById('pro-co').value.trim(),due:document.getElementById('pro-due').value||null,status:document.getElementById('pro-status').value,notes:[]});save();document.getElementById('pro-name').value='';document.getElementById('pro-co').value='';}
function deleteProspect(i){if(!confirm('Delete prospect?'))return;data.prospects.splice(i,1);save();}
function addProspectNote(i){const el=document.getElementById('pnote-'+i);const txt=el.value.trim();if(!txt)return;if(!data.prospects[i].notes)data.prospects[i].notes=[];data.prospects[i].notes.push(txt);save();el.value='';}

function renderQuestions(){
  const addRow=`<div class="input-row">
    <input type="text" id="q-txt" placeholder="Add a question or item to investigate..." onkeypress="if(event.key==='Enter')addQuestion()">
    <button onclick="addQuestion()"><i class="ti ti-plus"></i> Add</button>
  </div>`;
  const list=data.questions.map((q,i)=>`<div class="task${q.done?' done':''}">
    <input type="checkbox"${q.done?' checked':''} onchange="toggleQ(${i})" style="cursor:pointer;accent-color:var(--accent)">
    <div class="task-body"><div class="task-text">${q.text}</div></div>
    <div class="task-actions"><button class="act-btn" onclick="deleteQ(${i})"><i class="ti ti-trash"></i></button></div>
  </div>`).join('');
  return`<div class="section-title">Questions to Investigate</div>${addRow}${list||'<div class="empty">No questions yet</div>'}`;
}
function addQuestion(){const txt=document.getElementById('q-txt').value.trim();if(!txt)return;data.questions.push({id:uid(),text:txt,done:false});save();document.getElementById('q-txt').value='';}
function toggleQ(i){data.questions[i].done=!data.questions[i].done;save();}
function deleteQ(i){data.questions.splice(i,1);save();}

function renderReview(){
  const t=todayStr();
  const wa=new Date();wa.setDate(wa.getDate()-7);
  const was=wa.toISOString().slice(0,10);
  const soon3=new Date();soon3.setDate(soon3.getDate()+3);
  const soon3s=soon3.toISOString().slice(0,10);

  const allTasks=[
    ...data.today.map(x=>({...x,sourceList:'Daily'})),
    ...data.week.map(x=>({...x,sourceList:'Weekly'}))
  ];
  const overdue=allTasks.filter(x=>!x.done&&x.due&&x.due<t);
  const dueToday=allTasks.filter(x=>!x.done&&x.due===t);
  const dueSoon=allTasks.filter(x=>!x.done&&x.due&&x.due>t&&x.due<=soon3s);
  const doneSince=allTasks.filter(x=>x.done&&x.doneAt>=was);

  const statsHTML=`<div class="stats">
    <div class="stat-card"><div class="stat-num red">${overdue.length}</div><div class="stat-label">Overdue</div></div>
    <div class="stat-card"><div class="stat-num">${dueToday.length}</div><div class="stat-label">Due Today</div></div>
    <div class="stat-card"><div class="stat-num">${dueSoon.length}</div><div class="stat-label">Due in 3 Days</div></div>
    <div class="stat-card"><div class="stat-num">${doneSince.length}</div><div class="stat-label">Done This Week</div></div>
  </div>`;

  function ri(x){
    const srcColor=x.sourceList==='Weekly'?'background:#e8f5e9;color:#2e7d32':'background:#e3f2fd;color:#1565c0';
    return`<div class="review-item${x.done?' done':!x.done&&x.due&&x.due<t?' overdue':''}">
      <span class="src-tag" style="${srcColor}">${x.sourceList}</span>
      <span style="flex:1">${x.text}</span>
      ${x.due?`<span style="font-size:11px;color:var(--muted)">${fmtDate(x.due)}</span>`:''}
      ${x.client?`<span class="tag tag-client" style="font-size:10px">${x.client}</span>`:''}
    </div>`;
  }

  const clientBreakdown=CLIENT_LIST.map(name=>{
    const stored=data.clients[name];if(!stored)return'';
    const tasks=(stored.tasks||[]).filter(t=>!t.done);
    if(!tasks.length)return'';
    return`<div style="margin-bottom:12px">
      <div style="font-weight:500;font-size:13px;margin-bottom:5px"><i class="ti ti-building" style="color:var(--accent)"></i> ${name} <span style="font-weight:400;color:var(--muted);font-size:12px">${tasks.length} active</span></div>
      ${tasks.map(t=>`<div class="review-item">${t.text}${t.due?` <span style="font-size:11px;color:var(--muted);margin-left:6px">${fmtDate(t.due)}</span>`:''}</div>`).join('')}
    </div>`;
  }).join('');

  return`<div class="section-title">Weekly Review</div>${statsHTML}
    <div class="review-section"><div class="review-title"><i class="ti ti-alert-triangle" style="color:var(--danger)"></i> Overdue (${overdue.length})</div>${overdue.length?overdue.map(ri).join(''):'<div class="empty">None overdue</div>'}</div>
    <div class="review-section"><div class="review-title"><i class="ti ti-calendar" style="color:var(--warn)"></i> Due Today (${dueToday.length})</div>${dueToday.length?dueToday.map(ri).join(''):'<div class="empty">Nothing due today</div>'}</div>
    <div class="review-section"><div class="review-title"><i class="ti ti-clock" style="color:var(--accent)"></i> Coming Up — 3 Days (${dueSoon.length})</div>${dueSoon.length?dueSoon.map(ri).join(''):'<div class="empty">Nothing due in 3 days</div>'}</div>
    <div class="review-section"><div class="review-title"><i class="ti ti-check" style="color:var(--success)"></i> Completed This Week (${doneSince.length})</div>${doneSince.length?doneSince.map(ri).join(''):'<div class="empty">Nothing completed this week yet</div>'}</div>
    <div class="review-section"><div class="review-title"><i class="ti ti-building" style="color:var(--accent2)"></i> Clients</div>${clientBreakdown||'<div class="empty">No active client tasks</div>'}</div>`;
}

function exportCSV(){
  const rows=[['List','Task','Priority','Due','Client','Done','MIT']];
  ['today','week'].forEach(list=>data[list].forEach(t=>rows.push([list,t.text,t.pri||'',t.due||'',t.client||'',t.done?'Yes':'No',t.mit?'Yes':'No'])));
  data.goals.forEach(t=>rows.push(['goals',t.text,t.pri||'',t.due||'','',t.done?'Yes':'No','']));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='dashboard-'+todayStr()+'.csv';a.click();
}

loadData();
</script>
